name: Cross-Platform Build & Auto Release

on:
  push:
    branches: [ "main", "master" ]

# Artifact okuma ve Release (sürüm) oluşturma yetkileri
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Linux için Ek Bağımlılıkları Kur
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter mcrcon pyinstaller pillow

    - name: Uygulamayı Derle
      run: |
        python build_exe.py

    # İşletim sistemine özel dosya düzenlemeleri (Zip'leme ve İsimlendirme)
    - name: Dosyaları Hazırla (Mac)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r MCRconPanel-macOS.zip MCRconPanel.app

    - name: Dosyaları Hazırla (Linux)
      if: runner.os == 'Linux'
      run: |
        cd dist
        mv MCRconPanel MCRconPanel-Linux

    - name: Çıktıyı GitHub'a Geçici Olarak Yükle
      uses: actions/upload-artifact@v4
      with:
        name: MCRconPanel-${{ runner.os }}
        path: |
          dist/MCRconPanel.exe
          dist/MCRconPanel-macOS.zip
          dist/MCRconPanel-Linux
        if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download all OS Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files
          merge-multiple: true

      - name: Parse Version Information
        id: version_info
        run: |
          TAG=$(jq -r '.tag' version.json)
          TITLE=$(jq -r '.title' version.json)
          BODY=$(jq -r '.description' version.json)
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          
          # Multiline output for GitHub Actions
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_info.outputs.tag }}
          name: ${{ steps.version_info.outputs.title }}
          body: ${{ steps.version_info.outputs.body }}
          files: release_files/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
