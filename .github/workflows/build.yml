name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Linux için Ek Bağımlılıkları Kur
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter mcrcon pyinstaller

    - name: Uygulamayı Derle
      run: |
        python build_exe.py
        
    - name: Çıktıyı GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        # Artifact adını işletim sistemine göre dinamik olarak belirleriz
        name: MCRconPanel-${{ runner.os }}
        # Hem Windows (.exe) hem de Mac/Linux (uzantısız) desteklemesi için tüm dist klasörünü alıyoruz
        path: dist/*
        if-no-files-found: error
